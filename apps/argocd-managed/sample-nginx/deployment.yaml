apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-nginx
  labels:
    app: argocd-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-demo
  template:
    metadata:
      labels:
        app: argocd-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sample-nginx
spec:
  selector:
    app: argocd-demo
  ports:
    - port: 80
      targetPort: 80
