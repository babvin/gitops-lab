apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# CI updates just this block on a successful build+push, e.g.:
#   kustomize edit set image ghcr.io/<GITHUB_OWNER>/sample-api=ghcr.io/<GITHUB_OWNER>/sample-api:<sha>
# which keeps deployment.yaml itself untouched -- ArgoCD then syncs the new tag.
images:
  - name: ghcr.io/babvin/sample-api
    newTag: latest
