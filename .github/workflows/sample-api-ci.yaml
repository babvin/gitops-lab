name: sample-api CI

# This file lives at the repo root because GitHub Actions only ever reads
# workflows from <repo-root>/.github/workflows/ -- it cannot live inside
# apps/argocd-managed/sample-api/ itself. The `paths` filters below are what
# scope it to this one service in an otherwise multi-app gitops monorepo.
on:
  push:
    branches: [main]
    paths:
      - "apps/argocd-managed/sample-api/**"
      - ".github/workflows/sample-api-ci.yml"
  pull_request:
    paths:
      - "apps/argocd-managed/sample-api/**"
      - ".github/workflows/sample-api-ci.yml"

defaults:
  run:
    working-directory: apps/argocd-managed/sample-api

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sample-api

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/argocd-managed/sample-api/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Build on every PR (catches Dockerfile breakage early) but only push
    # on main, and only once tests have passed.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: apps/argocd-managed/sample-api
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
