apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    # Replace with your actual GitOps repo URL (matches GITHUB_OWNER/GITHUB_REPO in .env)
    repoURL: https://github.com/<GITHUB_OWNER>/<GITHUB_REPO>.git
    targetRevision: main
    path: gitops/apps/argocd-managed
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-managed-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
