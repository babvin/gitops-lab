# `flux bootstrap` generates gotk-components.yaml / gotk-sync.yaml /
# kustomization.yaml in this same directory automatically -- don't hand-edit
# those. This file is the one thing you add on top: it tells Flux to also
# reconcile gitops/apps/flux-managed into its own namespace.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gitops-lab
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/<GITHUB_OWNER>/<GITHUB_REPO>.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-managed-apps
  namespace: flux-system
spec:
  interval: 1m
  path: ./gitops/apps/flux-managed
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-lab
